<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Talapker Admin</title>
		<meta
			name="description"
			content="Отдельный кабинет для просмотра заявок Talapker 2026"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css?v=20260319-4" />
	</head>
	<body
		data-supabase-url="https://xuqnazmuqhhpryhhvlrt.supabase.co"
		data-supabase-key="sb_publishable_K5IRSjzJHkqyRIGkILrajw_vxhn88FK"
	>
		<main class="page">
			<section class="auth-screen" id="authScreen">
				<div class="auth-card">
					<p class="eyebrow">Admin Access</p>
					<h1>Заявки Talapker 2026</h1>
					<p class="lead">
						Войдите через Supabase Auth, чтобы видеть заявки с публичного сайта.
					</p>

					<form class="auth-form" id="loginForm">
						<label>
							Email
							<input type="email" name="email" placeholder="admin@example.com" required />
						</label>

						<label>
							Пароль
							<input type="password" name="password" placeholder="Введите пароль" required />
						</label>

						<button class="button button-primary" type="submit">Войти</button>
					</form>

					<div class="status-message" id="authMessage" aria-live="polite"></div>
				</div>
			</section>

			<section class="dashboard hidden" id="dashboard">
				<div class="shell">
					<header class="topbar">
						<div>
							<p class="eyebrow">Отдельный сайт</p>
							<h2>Просмотр заявок</h2>
						</div>

						<div class="topbar-actions">
							<button class="button button-secondary" id="refreshBtn" type="button">
								Обновить
							</button>
							<button class="button button-secondary" id="logoutBtn" type="button">
								Выйти
							</button>
						</div>
					</header>

					<section class="summary-grid">
						<article class="summary-card">
							<span>Всего заявок</span>
							<strong id="totalCount">0</strong>
						</article>

						<article class="summary-card">
							<span>9-сынып</span>
							<strong id="basisNineCount">0</strong>
						</article>

						<article class="summary-card">
							<span>11-сынып</span>
							<strong id="basisElevenCount">0</strong>
						</article>
					</section>

					<section class="panel">
						<div class="panel-head">
							<div>
								<h3>Список заявок</h3>
								<p id="tableStatus">Загрузка данных...</p>
							</div>

							<input
								class="search-input"
								id="searchInput"
								type="search"
								placeholder="Поиск по имени, телефону или специальности"
							/>
						</div>

						<div class="table-wrap">
							<table class="requests-table">
								<thead>
									<tr>
										<th>Имя</th>
										<th>Телефон</th>
										<th>Основа</th>
										<th>Специальность</th>
										<th>Источник</th>
										<th>Дата</th>
										<th>Действие</th>
									</tr>
								</thead>
								<tbody id="requestsBody">
									<tr>
										<td colspan="7" class="empty-state">Пока нет данных</td>
									</tr>
								</tbody>
							</table>
						</div>
					</section>
				</div>
			</section>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="script.js?v=20260319-5"></script>
	</body>
</html>
